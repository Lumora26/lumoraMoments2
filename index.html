<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumora Love • Pedro & Mariana</title>
    
    <!-- METATAGS DE PREPARO E OTIMIZAÇÃO -->
    <meta name="description" content="Lumora - Transformando memórias em eternidade digital">
    <meta name="author" content="Lumora">
    <meta name="theme-color" content="#FAF4F2">
    <link rel="shortcut icon" href="assets/img/lumora/logolumora.png" type="image/x-icon">
    
    <!-- FONTES DO GOOGLE -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
    
    <!-- LINK PARA A FOLHA DE ESTILOS CENTRAL EM CSS PURO -->
    <link rel="stylesheet" href="./assets/css/style.css">
    <link rel="stylesheet" href="./assets/css/welcome.css">
</head>
<body class="bg-light-theme">

    <!-- MAIN: ENVOLTÓRIO DA TELA DE ABERTURA -->
    <main class="welcome-wrapper">
        <div id="welcomeScreen" class="welcome-screen">
            <div class="welcome-container">
                <!-- Tag Superior do Logo -->
                <span class="welcome-tag">Nossa Cápsula do Tempo • Lumora Love</span>
                
                <!-- Título Romântico -->
                <h1 class="welcome-title font-serif">Pedro & Mariana</h1>
                
                <!-- Texto de Convite -->
                <p class="welcome-text">
                    Preparei um presente diferente para você. Assista ao nosso vídeo de retrospectiva antes de abrir nossa cápsula de memórias.
                </p>
                
                <!-- Player de Vídeo -->
                <div class="welcome-video-wrapper">
                    <iframe
                        id="retroVideo"
                        class="welcome-video"
                        width="100%"
                        height="400"
                        src="https://www.youtube.com/embed/VJAECSOoXqM?enablejsapi=1"
                        title="Vídeo de Retrospectiva"
                        frameborder="0"
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                        allowfullscreen>
                    </iframe>
                </div>
                
                <!-- Redirecionamento Seguro para a Página Interna do Casamento -->
                <div class="welcome-btn-container">
                    <a href="./assets/pages/memorial.html" class="btn-primary uppercase tracking-wide">Abrir Nossa Cápsula</a>
                </div>
            </div>
        </div>
    </main>
    
    <!-- RODAPÉ DA ENTRADA -->
    <footer class="discreet-footer">
        <p>&copy; MDL • Memorial Digital Lumora</p>
    </footer>
</body>
</html>
